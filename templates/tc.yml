# Canonical TC template — single source of truth for all qa-* skills.
# All qa-plan, qa-sync, qa-adversarial, qa-codegen, qa-testrail output MUST conform to this shape.
# TC ID uses tc_id.format from qa-config.yml (default: TC-{DOM}-{X}.{Y}.{Z})
id: ""
title: ""
priority: P1             # P1 | P2 | P3
platform: web            # web | mobile | backend | non-functional
type: functional         # functional | integration | regression | smoke | performance | e2e | accessibility | security
preconditions:
  - ""
steps:
  - ""
  - ""
  - ""
expected_result: ""
jira_key: ""             # auto-linked if jira.project_key set; multiple keys space-separated
source_docs:
  - ""
automation_status: manual   # manual | automated
automation_id: ""        # backfilled by /qa-codegen

# Optional fields — absent is fine. When present, must match the declared shape.
tags: []                 # free-form slice keys, e.g. ["smoke", "checkout", "regression-q2"]
owner: ""                # individual or team responsible; free-form string
deprecated: false        # true → excluded from run + testrail push; never deleted
obsoletes: []            # TC IDs this case supersedes (list of strings)
